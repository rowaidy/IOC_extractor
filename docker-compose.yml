services:
  web:
    build: .
    ports:
      - "80:80"
    environment:
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      # DOCLING_PYTHON: /rails/docling-venv/bin/python3
    volumes:
      # Persist generated IOC files across restarts
      - ioc_files:/rails/tmp/ioc_files
      # Persist SQLite databases (sessions, solid cache/queue/cable)
      - sqlite_data:/rails/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/up"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  ioc_files:
  sqlite_data:
